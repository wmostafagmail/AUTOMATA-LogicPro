version: 1
registry_name: vhdl-skills-registry
description: VHDL-focused registry used by the VHDL-skill-orchestrator to select and sequence FPGA/VHDL skills.

skills:
  - name: VHDL-skill-orchestrator
    path: .agents/skills/VHDL-skill-orchestrator/SKILL.md
    description: VHDL-focused meta-skill that selects, sequences, and coordinates FPGA/VHDL-related specialized skills.
    domains: [vhdl-orchestration, fpga, rtl, orchestration, routing, planning]
    phases: [requirements, architecture, design, implementation, debugging, verification, documentation, review]
    outputs: [skill-call-plan, merged-output, checklist]
    trigger_keywords: [vhdl, fpga, rtl, orchestrate, route, skills, call skills, use skills, skill list]
    priority: 1000
    conflicts: []

  - name: vhdl-language
    path: .agents/skills/vhdl-language/SKILL.md
    description: FPGA/VHDL architecture, RTL implementation, verification, synthesis, timing, CDC, and debug skill.
    domains: [fpga, rtl, vhdl, ieee-1076, synthesis]
    phases: [requirements, architecture, design, implementation, debugging, verification, optimization]
    outputs: [vhdl, testbench, constraints, design-notes, debug-analysis]
    trigger_keywords: [vhdl, fpga, rtl, vivado, quartus, ghdl, ieee 1076, testbench, synthesis]
    priority: 100
    toolchains: [ghdl, vivado, quartus, questa, modelsim, riviera-pro]
    conflicts: []

  - name: fpga-architecture
    path: .agents/skills/fpga-architecture/SKILL.md
    description: FPGA system architecture, clock/reset planning, CDC strategy, datapath/control design, and resource planning.
    domains: [fpga, rtl, architecture, timing]
    phases: [requirements, architecture, design, optimization]
    outputs: [architecture-plan, block-diagram-description, interface-plan, risk-register]
    trigger_keywords: [fpga architecture, clock domain, reset, cdc, pipeline, bram, dsp]
    priority: 90
    conflicts: []

  - name: rtl-verification
    path: .agents/skills/rtl-verification/SKILL.md
    description: Self-checking testbenches, assertions, scoreboards, simulation plans, and regression strategy for RTL.
    domains: [rtl, verification, simulation, testbench]
    phases: [verification, debugging, review]
    outputs: [testbench, assertions, simulation-plan, regression-commands]
    trigger_keywords: [testbench, simulation, assertion, scoreboard, coverage, vunit, osvvm, uvvm]
    priority: 85
    conflicts: []

  - name: timing-constraints
    path: .agents/skills/timing-constraints/SKILL.md
    description: FPGA timing constraints, clock constraints, generated clocks, false paths, multicycle paths, and timing debug.
    domains: [fpga, timing, constraints, synthesis, implementation]
    phases: [design, verification, optimization, debugging]
    outputs: [xdc, sdc, timing-notes, constraints-checklist]
    trigger_keywords: [xdc, sdc, timing, constraints, setup, hold, false path, multicycle]
    priority: 80
    conflicts: []
